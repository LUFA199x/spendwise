name: Pre-Merge Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vite build
        run: npm run build

  backend:
    name: Backend – Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Compile
        run: npm run build
